name: Release & Publish NuGet

on:
  push:
    branches: [main]
    paths:
      - 'Directory.Build.props'

jobs:
  check-version:
    name: Check version change
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      changed: ${{ steps.compare.outputs.changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract current version
        id: extract
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' Directory.Build.props)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Check if version changed
        id: compare
        run: |
          PREV_VERSION=$(git show HEAD~1:Directory.Build.props 2>/dev/null | grep -oP '<Version>\K[^<]+' || echo "")
          CURR_VERSION=$(grep -oP '<Version>\K[^<]+' Directory.Build.props)
          echo "Previous version: $PREV_VERSION"
          echo "Current version: $CURR_VERSION"
          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed from $PREV_VERSION to $CURR_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged"
          fi

  release:
    name: Build, Publish & Release
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Sherlock.Net.slnx

      - name: Build Release
        run: dotnet build Sherlock.Net.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/Sherlock.Net.Core.Tests --configuration Release --no-build --verbosity normal

      - name: Pack NuGet packages
        run: dotnet pack Sherlock.Net.slnx --configuration Release --no-build --output ./nupkgs

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push ./nupkgs/Sherlock.Net.${{ needs.check-version.outputs.version }}.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push ./nupkgs/Sherlock.Net.Cli.${{ needs.check-version.outputs.version }}.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: |
            ## Sherlock.Net v${{ needs.check-version.outputs.version }}

            ### Install

            **CLI tool:**
            ```bash
            dotnet tool install --global Sherlock.Net.Cli --version ${{ needs.check-version.outputs.version }}
            ```

            **Library:**
            ```bash
            dotnet add package Sherlock.Net --version ${{ needs.check-version.outputs.version }}
            ```

            ### NuGet Packages

            - [Sherlock.Net](https://www.nuget.org/packages/Sherlock.Net/${{ needs.check-version.outputs.version }}) - Core library
            - [Sherlock.Net.Cli](https://www.nuget.org/packages/Sherlock.Net.Cli/${{ needs.check-version.outputs.version }}) - CLI tool
          files: |
            ./nupkgs/Sherlock.Net.${{ needs.check-version.outputs.version }}.nupkg
            ./nupkgs/Sherlock.Net.Cli.${{ needs.check-version.outputs.version }}.nupkg
          generate_release_notes: true
