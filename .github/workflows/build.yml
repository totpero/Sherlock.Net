name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Sherlock.Net.slnx

      - name: Build
        run: dotnet build Sherlock.Net.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Sherlock.Net.Core.Tests --configuration Release --no-build --verbosity normal
